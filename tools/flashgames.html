<div id="flash-hub">
    <div id="flash-games-view">
        <div id="flash-games-list" class="downloads-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            </div>
        
        <div style="margin-top: 30px; padding: 15px; background: var(--color-bg-2); border-radius: var(--radius-base); text-align: center; font-size: 0.85rem; color: var(--color-text-secondary); border: 1px solid var(--color-border);">
            <i data-lucide="info" style="width: 20px; height: 20px; color: var(--color-primary); margin-bottom: 8px;"></i><br>
            <strong>Notice:</strong> These flash games are uploaded strictly for archival purposes.
        </div>
    </div>

    <div id="flash-player-container" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--color-border);">
            <button class="btn btn--outline btn--sm" onclick="closeFlashGame()">
                <i data-lucide="arrow-left" style="width: 16px; margin-right: 6px;"></i> Back
            </button>
            <h3 id="current-game-title" style="margin: 0; color: var(--color-primary); font-size: 1.2rem; text-align: center; flex: 1;"></h3>
            <div style="width: 80px;"></div> 
        </div>
        
        <div id="ruffle-embed-area" style="width: 100%; height: 60vh; min-height: 400px; max-height: 600px; display: flex; justify-content: center; align-items: center; background: #000; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg);">
        </div>
        
        <div id="flash-controls-area" style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--color-bg-2); padding: 12px 15px; border-radius: var(--radius-base); border: 1px solid var(--color-border);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-weight: 500; font-size: 0.9rem; color: var(--color-text-secondary);">Controls:</span>
                <div id="game-controls-display" style="display: flex; gap: 8px; flex-wrap: wrap;">
                    </div>
            </div>
            
            <button class="btn btn--primary btn--sm" onclick="fullscreenFlashGame()">
                <i data-lucide="maximize" style="width: 16px; margin-right: 6px;"></i> Full Screen
            </button>
        </div>
    </div>
</div>

<script>
(async function() {
    if (!window.RufflePlayer) {
        const script = document.createElement('script');
        script.src = "https://unpkg.com/@ruffle-rs/ruffle";
        document.head.appendChild(script);
    }

    try {
        const res = await fetch(`content/flash/games.json?v=${new Date().getTime()}`);
        if (!res.ok) throw new Error("games.json not found");
        const games = await res.json();
        
        const list = document.getElementById('flash-games-list');
        list.innerHTML = games.map(g => {
            // Extragem controalele (sau punem default)
            const ctrls = g.controls ? g.controls.join(',') : 'mouse';
            return `
            <div class="tool-card" onclick="playFlashGame('${g.file}', '${g.name.replace(/'/g, "\\'")}', '${ctrls}')" style="cursor:pointer; text-align:center; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
                <i data-lucide="gamepad-2" style="width:40px; height:40px; margin-bottom:12px; color:var(--color-primary);"></i>
                <h3 class="tool-title" style="font-size: 1.1rem; margin-bottom: 8px;">${g.name}</h3>
                <p class="tool-description" style="font-size: 0.85rem; margin-bottom: 0;">${g.description || 'Play classic flash game'}</p>
            </div>
            `;
        }).join('');
        
        if(window.lucide) window.lucide.createIcons();
    } catch (e) {
        document.getElementById('flash-games-list').innerHTML = '<p style="text-align: center; color: var(--color-error); grid-column: 1/-1;">Eroare la încărcare.</p>';
    }
})();

window.playFlashGame = function(swfFile, gameName, controlsStr) {
    document.getElementById('flash-games-view').style.display = 'none';
    const playerContainer = document.getElementById('flash-player-container');
    playerContainer.style.display = 'flex';
    document.getElementById('current-game-title').textContent = gameName;
    
    // NOU: Generare vizuală a controalelor
    const controlsArr = controlsStr.split(',');
    const controlsHtml = controlsArr.map(c => {
        const map = {
            'mouse': '<i data-lucide="mouse" style="width:14px;"></i> Mouse',
            'arrows': '<i data-lucide="move" style="width:14px;"></i> Săgeți',
            'space': '<i data-lucide="space" style="width:14px; margin-top:2px;"></i> Space',
            'click': '<i data-lucide="mouse-pointer-click" style="width:14px;"></i> Click',
            'wasd': '<b style="font-family:monospace; font-size:12px;">WASD</b>'
        };
        return `<span style="display:flex; align-items:center; gap:5px; background:var(--color-bg-1); padding:4px 8px; border-radius:4px; border:1px solid var(--color-border); font-size:0.8rem;">${map[c.trim()] || c}</span>`;
    }).join('');
    document.getElementById('game-controls-display').innerHTML = controlsHtml || '<span style="font-size: 0.8rem;">Standard</span>';

    const embedArea = document.getElementById('ruffle-embed-area');
    embedArea.innerHTML = '<div style="color: white; display: flex; flex-direction: column; align-items: center; gap: 10px;"><i data-lucide="loader" class="spin"></i> Loading Emulator...</div>';
    if(window.lucide) window.lucide.createIcons();
    
    const checkRuffle = setInterval(() => {
        if (window.RufflePlayer) {
            clearInterval(checkRuffle);
            embedArea.innerHTML = ''; 
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            player.style.width = '100%';
            player.style.height = '100%';
            embedArea.appendChild(player);
            player.load('content/flash/' + swfFile);
        }
    }, 100);
};

// NOU: Funcția pentru Fullscreen
window.fullscreenFlashGame = function() {
    const embedArea = document.getElementById('ruffle-embed-area');
    if (!document.fullscreenElement) {
        if (embedArea.requestFullscreen) {
            embedArea.requestFullscreen();
        } else if (embedArea.webkitRequestFullscreen) { /* Safari */
            embedArea.webkitRequestFullscreen();
        } else if (embedArea.msRequestFullscreen) { /* IE11 */
            embedArea.msRequestFullscreen();
        }
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
};

window.closeFlashGame = function() {
    document.getElementById('flash-player-container').style.display = 'none';
    const embedArea = document.getElementById('ruffle-embed-area');
    const rufflePlayer = embedArea.querySelector('ruffle-player');
    
    if (rufflePlayer) {
        try { rufflePlayer.pause(); } catch(e) {}
        rufflePlayer.remove(); 
    }
    embedArea.innerHTML = ''; 
    document.getElementById('flash-games-view').style.display = 'block';
};
</script>
